<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>父亲节快乐</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }
        a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            border-radius: 24px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        a:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
        }
        a:active {
            transform: scale(0.98);
        }
        a img {
            display: block;
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 20px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5), 0 0 30px rgba(255,215,0,0.15);
        }
        .hint {
            color: rgba(255,215,0,0.8);
            font-size: 16px;
            margin-top: 18px;
            letter-spacing: 4px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <a href="https://quanerqingqing.github.io/fathersday/">
        <img src="cover.png" alt="父亲节快乐">
    </a>
    <div class="hint">👆 点击图片，开启贺卡</div>
</body>
</html>
