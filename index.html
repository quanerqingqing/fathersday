<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>父亲节快乐 - 互动版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow-x: hidden;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 背景星星 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) infinite;
            animation-delay: var(--delay);
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* 主标题 */
        .title {
            position: relative;
            z-index: 10;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 10px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ffd700, #ffec8b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            animation: titleGlow 2s ease-in-out infinite;
        }
        @keyframes titleGlow {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
            50% { filter: brightness(1.3) drop-shadow(0 0 20px rgba(255,215,0,0.8)); }
        }

        /* 信封卡片 */
        .card-container {
            position: relative;
            z-index: 10;
            width: 340px;
            height: 420px;
            margin: 30px 0;
            perspective: 1200px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-inner.opened {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,71,87,0.2);
        }

        /* 正面 - 信封 */
        .card-front {
            background: linear-gradient(145deg, #2c1810, #4a2c17);
            border: 3px solid #8b6914;
        }
        .card-front::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 2px dashed rgba(139,105,20,0.4);
            border-radius: 12px;
            pointer-events: none;
        }
        .front-icon {
            font-size: 80px;
            margin-bottom: 15px;
            animation: centerPulse 2s ease-in-out infinite;
        }
        @keyframes centerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .front-text {
            color: #d4a574;
            font-size: 20px;
            letter-spacing: 6px;
            margin-bottom: 5px;
        }
        .front-hint {
            color: rgba(212,165,116,0.6);
            font-size: 13px;
            letter-spacing: 3px;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle, #c41e3a, #8b0000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            box-shadow: 0 4px 15px rgba(196,30,58,0.5);
        }

        /* 背面 - 贺卡内容 */
        .card-back {
            background: linear-gradient(145deg, #1e1410, #2c1a12);
            border: 3px solid #ffd700;
            transform: rotateY(180deg);
            padding: 30px 25px;
            justify-content: flex-start;
            gap: 12px;
        }
        .back-title {
            font-size: 26px;
            color: #ffd700;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255,215,0,0.4);
            margin-top: 10px;
        }
        .back-divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            margin: 5px 0 15px;
        }
        .back-msg {
            color: #e0d5c1;
            font-size: 15px;
            line-height: 2;
            text-align: center;
        }
        .back-msg span {
            color: #ff6b6b;
        }
        .back-sign {
            color: #d4a574;
            font-size: 14px;
            margin-top: auto;
            align-self: flex-end;
            letter-spacing: 3px;
        }
        .back-heart {
            font-size: 40px;
            margin-top: 10px;
            animation: centerPulse 1.5s ease-in-out infinite;
        }

        /* 按钮 */
        .btn-group {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            outline: none;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-heart {
            background: linear-gradient(135deg, #ff4757, #c41e3a);
            color: #fff;
            box-shadow: 0 6px 20px rgba(255,71,87,0.4);
        }
        .btn-heart:hover {
            box-shadow: 0 8px 30px rgba(255,71,87,0.6);
            transform: translateY(-2px);
        }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #2c1810;
            box-shadow: 0 6px 20px rgba(255,215,0,0.3);
        }
        .btn-gold:hover {
            box-shadow: 0 8px 30px rgba(255,215,0,0.5);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            color: #ffd700;
            border: 2px solid #ffd700;
        }
        .btn-outline:hover {
            background: rgba(255,215,0,0.1);
            transform: translateY(-2px);
        }

        /* 浮动爱心 */
        .floating-heart {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            z-index: 999;
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1) rotate(0deg);
            }
            60% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translateY(-300px) scale(0.3) rotate(360deg);
            }
        }

        /* 烟花粒子 */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 998;
            border-radius: 50%;
            animation: burst 1.2s ease-out forwards;
        }
        @keyframes burst {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }

        /* 音乐按钮 */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.5);
            background: rgba(0,0,0,0.4);
            color: #ffd700;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            outline: none;
        }
        .music-btn:hover {
            border-color: #ffd700;
            background: rgba(255,215,0,0.15);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .music-btn.playing {
            animation: musicPulse 2s ease-in-out infinite;
        }
        @keyframes musicPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,215,0,0.3); }
            50% { box-shadow: 0 0 25px rgba(255,215,0,0.6); }
        }
        .music-btn .wave-bars {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 16px;
        }
        .music-btn .wave-bar {
            width: 3px;
            background: #ffd700;
            border-radius: 1px;
            transition: height 0.2s;
        }
        .music-btn.playing .wave-bar:nth-child(1) { animation: barAnim 0.6s infinite; }
        .music-btn.playing .wave-bar:nth-child(2) { animation: barAnim 0.8s infinite 0.15s; }
        .music-btn.playing .wave-bar:nth-child(3) { animation: barAnim 0.7s infinite 0.3s; }
        .music-btn.playing .wave-bar:nth-child(4) { animation: barAnim 0.5s infinite 0.45s; }
        @keyframes barAnim {
            0%, 100% { height: 4px; }
            50% { height: 14px; }
        }
        .music-btn.paused .wave-bar { height: 2px; }

        /* 底部信息 */
        .footer-msg {
            position: fixed;
            bottom: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            letter-spacing: 2px;
            z-index: 10;
        }

        @media (max-width: 500px) {
            .card-container {
                width: 280px;
                height: 360px;
            }
            .title { font-size: 26px; letter-spacing: 6px; }
            .btn { padding: 10px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <!-- 标题 -->
    <div class="title">父爱如山</div>

    <!-- 可翻页贺卡 -->
    <div class="card-container" id="card">
        <div class="card-inner" id="cardInner">
            <!-- 正面 -->
            <div class="card-front">
                <div class="seal">♥</div>
                <div class="front-icon">💌</div>
                <div class="front-text">致 · 亲爱的爸爸</div>
                <div class="front-hint">👆 点击打开贺卡</div>
            </div>
            <!-- 背面 -->
            <div class="card-back">
                <div class="back-title">父亲节快乐</div>
                <div class="back-divider"></div>
                <div class="back-msg">
                    爸爸，<br>
                    您是我生命中最坚实的<span>依靠</span>，<br>
                    感谢您一直以来的<br>
                    <span>守护与关爱</span>。<br>
                    愿时光慢一点，<br>
                    让我陪您更久一点。
                </div>
                <div class="back-heart">❤️</div>
                <div class="back-sign">— 永远爱您的孩子</div>
            </div>
        </div>
    </div>

    <!-- 按钮组 -->
    <div class="btn-group">
        <button class="btn btn-heart" id="btnHeart" onclick="burstHearts()">💝 点我送心</button>
        <button class="btn btn-gold" id="btnFirework" onclick="firework()">✨ 点我放烟花</button>
        <button class="btn btn-outline" id="btnFlip" onclick="flipCard()">🔄 翻转贺卡</button>
    </div>

    <!-- 音乐开关 -->
    <button class="music-btn playing" id="musicBtn" onclick="toggleMusic()" title="音乐 开/关">
        <div class="wave-bars">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
    </button>

    <div class="footer-msg">♥ Happy Father's Day ♥</div>

    <script>
        // ===== 创建星空 =====
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    --dur: ${Math.random() * 3 + 2}s;
                    --delay: ${Math.random() * 4}s;
                `;
                container.appendChild(star);
            }
        }

        // ===== 翻卡 =====
        let isOpen = false;
        function flipCard() {
            isOpen = !isOpen;
            document.getElementById('cardInner').classList.toggle('opened', isOpen);
        }

        // ===== 点击卡片翻转 =====
        document.getElementById('card').addEventListener('click', function(e) {
            if (e.target.closest('button')) return;
            flipCard();
        });

        // ===== 点击页面任意位置弹出爱心 =====
        document.addEventListener('click', function(e) {
            if (e.target.closest('button') || e.target.closest('.card-container')) return;
            spawnHeart(e.clientX, e.clientY);
        });

        function spawnHeart(x, y) {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = ['❤️', '💕', '💖', '💗', '♥', '💝'][Math.floor(Math.random() * 6)];
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            heart.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        // ===== 按钮1：爱心爆发 =====
        function burstHearts() {
            const btn = document.getElementById('btnHeart');
            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const ox = cx + (Math.random() - 0.5) * 200;
                    const oy = cy + (Math.random() - 0.5) * 200;
                    spawnHeart(ox, oy);
                }, i * 30);
            }
            // 按钮点击反馈
            btn.style.transform = 'scale(1.1)';
            setTimeout(() => btn.style.transform = '', 150);
        }

        // ===== 按钮2：烟花效果 =====
        function firework() {
            const btn = document.getElementById('btnFirework');
            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const colors = ['#ff4757', '#ffd700', '#ff6b6b', '#fff', '#ff8c00', '#7bed9f', '#70a1ff'];

            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const angle = (Math.PI * 2 * i) / 50;
                const distance = Math.random() * 150 + 80;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                const size = Math.random() * 6 + 3;
                particle.style.cssText = `
                    left: ${cx}px;
                    top: ${cy}px;
                    width: ${size}px;
                    height: ${size}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    --dx: ${dx}px;
                    --dy: ${dy}px;
                    animation-duration: ${Math.random() * 0.8 + 0.8}s;
                `;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1200);
            }
            btn.style.transform = 'scale(1.1)';
            setTimeout(() => btn.style.transform = '', 150);
        }

        // ===== 初始动画：自动展示 =====
        function autoShow() {
            setTimeout(() => {
                flipCard(); // 2秒后自动打开贺卡
            }, 1500);
            setTimeout(() => {
                flipCard(); // 5秒后自动合上
            }, 4500);
        }

        // ===== 背景音乐 (Web Audio API) =====
        let audioCtx = null;
        let musicPlaying = true;
        let masterGain = null;
        let melodyTimer = null;
        let currentNoteIdx = 0;

        // 温馨旋律 - C大调五声音阶 (C4=262, D4=294, E4=330, G4=392, A4=440, C5=523)
        const pentatonic = [262, 294, 330, 392, 440, 523, 587, 659, 784];
        // 旋律序列 (音高索引, 时值比例)
        const melody = [
            [4, 0.6], [3, 0.3], [2, 0.3], [3, 0.6], [1, 0.3], [0, 0.6],  // 6 5 3 5 2 1
            [2, 0.6], [3, 0.3], [4, 0.6], [4, 0.6], [3, 0.3], [2, 0.6],  // 3 5 6 6 5 3
            [4, 0.4], [5, 0.2], [5, 0.6], [4, 0.3], [3, 0.3], [2, 0.8],  // 6 i i 6 5 3
            [1, 0.6], [2, 0.3], [3, 0.6], [2, 0.3], [1, 0.3], [0, 1.2],  // 2 3 5 3 2 1
            [3, 0.6], [5, 0.3], [6, 0.6], [5, 0.3], [3, 0.3], [2, 0.8],  // 5 i i i 5 3
            [3, 0.6], [2, 0.3], [1, 0.6], [0, 0.6], [1, 0.6], [2, 1.2],  // 5 3 2 1 2 3
            [3, 0.6], [4, 0.3], [5, 0.6], [3, 0.6], [2, 0.3], [1, 1.2],  // 5 6 i 5 3 2
            [0, 0.6], [2, 0.3], [1, 0.8],                                 // 1 3 2 (收尾)
        ];

        const baseTempo = 420; // 每拍毫秒数

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.18;
            masterGain.connect(audioCtx.destination);
        }

        function playNote(freqIndex, duration, startTime) {
            if (!audioCtx || !musicPlaying) return;
            const freq = pentatonic[freqIndex];
            const now = startTime || audioCtx.currentTime;
            const dur = duration / 1000;

            // 主音色 (类似钢琴)
            const osc = audioCtx.createOscillator();
            const env = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            // 加入微弱的泛音
            const osc2 = audioCtx.createOscillator();
            const env2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(freq * 2, now);
            env2.gain.setValueAtTime(0.15, now);
            env2.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.8);

            env.gain.setValueAtTime(0.7, now);
            env.gain.exponentialRampToValueAtTime(0.35, now + dur * 0.3);
            env.gain.exponentialRampToValueAtTime(0.001, now + dur * 0.9);

            osc.connect(env);
            osc2.connect(env2);
            env.connect(masterGain);
            env2.connect(masterGain);

            osc.start(now);
            osc.stop(now + dur);
            osc2.start(now);
            osc2.stop(now + dur);
        }

        function playMelody() {
            if (!musicPlaying || !audioCtx) return;
            const note = melody[currentNoteIdx];
            playNote(note[0], note[1] * baseTempo);
            currentNoteIdx = (currentNoteIdx + 1) % melody.length;
            melodyTimer = setTimeout(playMelody, note[1] * baseTempo);
        }

        function startMusic() {
            initAudio();
            musicPlaying = true;
            currentNoteIdx = 0;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            playMelody();
            const btn = document.getElementById('musicBtn');
            btn.classList.add('playing');
            btn.classList.remove('paused');
            btn.title = '音乐: 播放中 (点击关闭)';
        }

        function stopMusic() {
            musicPlaying = false;
            if (melodyTimer) {
                clearTimeout(melodyTimer);
                melodyTimer = null;
            }
            const btn = document.getElementById('musicBtn');
            btn.classList.remove('playing');
            btn.classList.add('paused');
            btn.title = '音乐: 已关闭 (点击开启)';
        }

        function toggleMusic() {
            if (musicPlaying) {
                stopMusic();
            } else {
                startMusic();
            }
        }

        // 首次用户点击页面时初始化音频（浏览器策略要求）
        let audioInitialized = false;
        document.addEventListener('click', function initAudioOnce() {
            if (!audioInitialized) {
                audioInitialized = true;
                startMusic();
            }
        }, { once: false });

        // ===== 键盘快捷键 =====
        document.addEventListener('keydown', function(e) {
            switch(e.key.toLowerCase()) {
                case 'f': flipCard(); break;         // F = 翻转
                case 'h': burstHearts(); break;      // H = 爱心
                case ' ': 
                    e.preventDefault();
                    firework(); 
                    break;                           // 空格 = 烟花
                case 'g':
                    for (let i = 0; i < 8; i++) {
                        setTimeout(() => {
                            spawnHeart(
                                Math.random() * window.innerWidth,
                                Math.random() * window.innerHeight * 0.8
                            );
                        }, i * 60);
                    }
                    break;                           // G = 全屏散落爱心
                case 'm': toggleMusic(); break;      // M = 开关音乐
            }
        });

        // ===== 启动 =====
        createStars();
        autoShow();
    </script>
</body>
</html>
